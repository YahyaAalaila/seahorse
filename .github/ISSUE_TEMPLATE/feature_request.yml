name: Feature request
description: Propose a new capability, model, dataset, or workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem would this solve for Seahorse users?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - Python API
        - CLI
        - Models
        - Datasets
        - Benchmarks
        - Evaluation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds or related tools.
    validations:
      required: false
