site_name: Seahorse
site_description: "Unified benchmarking for heterogeneous spatio-temporal point processes"
docs_dir: docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

extra_css:
  - assets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started.md
      - Data Format: data-format.md
  - Python API:
      - Run One Model: python-api.md
  - CLI Workflows:
      - CLI Reference: cli.md
      - Evaluation: evaluation.md
  - Benchmarking:
      - Benchmark Campaigns: benchmarks.md
      - Model Capability Matrix: model-capability-matrix.md
  - Concepts:
      - Architecture: architecture.md
  - Model Developers:
      - Add A Model: adding-a-model.md
  - Examples:
      - Tutorial Notebooks: examples/colabs.md
      - Inspect Data: examples/inspect-data.md
      - Train One Model: examples/train-one-model.md
      - Run A Small Benchmark: examples/run-a-small-benchmark.md
      - Evaluate Results: examples/evaluate-and-visualize-results.md
  - Paper Reproduction: paper-reproduction.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

exclude_docs: |
  DEVELOPMENT.md
  EXPERIMENT_READINESS.md
  BENCHMARK.md
  evaluation_layout.md
  metrics_catalog.md
  metrics_paper_ready.md
  original_models_manifesto.md
  wrapper_audit.md
  appendix_evaluation.md
  internal/**
  release/**
