site_name: Seahorse
site_description: Unified spatio-temporal point process modeling documentation
docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started.md
      - Data Format: data-format.md
  - Python API:
      - Run One Model: python-api.md
  - CLI Workflows:
      - CLI Reference: cli.md
      - Evaluation And Visualization: evaluation.md
  - Benchmarking:
      - Benchmark Campaigns: benchmarks.md
      - Model Capability Matrix: model-capability-matrix.md
  - Model Developers:
      - Adding A Model: adding-a-model.md
  - Examples:
      - Tutorial Notebooks: examples/colabs.md
      - Inspect Data: examples/inspect-data.md
      - Train One Model: examples/train-one-model.md
      - Train And Evaluate One Model: examples/train-and-evaluate-one-model.md
      - Benchmark Models: examples/benchmark-models.md
      - Run A Small Benchmark: examples/run-a-small-benchmark.md
      - Evaluate And Visualize: examples/evaluate-and-visualize.md
      - Evaluate And Visualize Results: examples/evaluate-and-visualize-results.md
  - Paper Reproduction: paper-reproduction.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets

exclude_docs: |
  DEVELOPMENT.md
  EXPERIMENT_READINESS.md
  BENCHMARK.md
  evaluation_layout.md
  metrics_catalog.md
  metrics_paper_ready.md
  original_models_manifesto.md
  wrapper_audit.md
  appendix_evaluation.md
  internal/**
  release/**
