data:
  protocol: unified
  normalize: true
  batch_size: 128
  num_workers: 0
  seed: 42
  paper_lookback: null
  paper_lookahead: 1
  paper_split_ratio:
  - 8
  - 1
  - 1
  type: hawkes
  n_train: 200
  n_val: 50
  T: 10.0
model:
  preset: auto_stpp
  hidden_dim: 128
  spatial_dim: 2
  n_marks: 0
  event_cov_dim: 0
  field_cov_dim: 0
  encoder:
    type: transformer
    num_heads: 2
    num_layers: 3
    dropout: 0.1
  updater:
    type: attention
    num_heads: 2
  decoder:
    n_layers: 2
    n_components: 5
    internal_dim: 64
training:
  lr: 0.005634899141619457
  weight_decay: 1.0e-05
  grad_clip: 5.0
  n_epochs: 50
  batch_size: 128
  patience: null
  adam_beta1: 0.9
  adam_beta2: 0.999
  device: auto
  lr_schedule: constant
  lr_warmup_epochs: 0
  lr_step_size: 50
  lr_step_gamma: 0.5
  vae_beta: 0.0
logging:
  out_dir: runs/
  experiment_name: null
  save_checkpoints: true
  wandb: null
