# Canonical AutoSTPP preset.
#
# This is the AutoSTPP configuration used by current benchmark runs.

model:
  preset: auto_stpp
  hidden_dim: 128
  spatial_dim: 2
  n_marks: 0
  event_cov_dim: 0
  field_cov_dim: 0
  decoder:
    type: autoint
    lookback: 20
    lookahead: 1
    activation: tanh
    bias: true
    trunc: false
    max_history: 20
    temporal_diag_mode: exact
    temporal_mc_samples: 10
    report_orig_space_metrics: true
    n_prodnet: 10
    hidden_size: 128
    num_layers: 2

training:
  lr: 4.0e-3
  optimizer: adam
  weight_decay: 0.0
  grad_clip: 1.0
  n_epochs: 50
  batch_size: 128
  patience: null
  adam_beta1: 0.9
  adam_beta2: 0.999
  device: auto
  lr_schedule: step
  lr_warmup_epochs: 0
  lr_final: null
  lr_step_size: 20
  lr_step_gamma: 0.5
  checkpoint_select: best
  test_nll_space: raw
  vae_beta: 0.0

data:
  protocol: raw
  normalize: false
  adapter_kwargs:
    training_view: sliding_window
    lookback: 20
    lookahead: 1
