model:
  preset: auto_stpp
  hidden_dim: 64
  spatial_dim: 2
  n_marks: 0
  # Architecture overrides — deep-merged with the preset.
  # The most important tunable for AutoSTPP is the spatial bounding box, which
  # must be in *normalised* coordinates (i.e. divided by the dataset loc_std).
  #
  #   rule of thumb:  bbox = raw_spatial_bounds / loc_std
  #
  # For the default Hawkes data (spatial_bounds=[-5,5], loc_std≈2.9) that gives
  # ≈[-1.73, 1.73].  [-2, 2] is a safe margin.  Setting this too wide (e.g. the
  # raw [-5, 5]) inflates the compensator ~8× and is the main cause of high NLL.
  overrides:
    decoder:
      x_lo: -2.0
      x_hi: 2.0
      y_lo: -2.0
      y_hi: 2.0
      n_components: 8
      n_layers: 2
      internal_dim: 64

training:
  lr: {min: 1.0e-4, max: 1.0e-2}
  weight_decay: 1.0e-5
  grad_clip: 5.0
  n_epochs: 100
  batch_size: 32
  early_stopping_patience: 20

data:
  type: hawkes
  n_train: 200
  n_val: 50
  T: 10.0
