# Faithful shared-hidden Neural STPP JumpCNF preset.
#
# Shared family contract:
#   - raw time is reconstructed locally inside the Neural STPP state model
#   - standardized space is preserved from the benchmark data path
#   - the spatial decoder receives the full shared temporal hidden state
#   - solve_reverse uses the shared temporal hidden dynamics

model:
  preset: neural_stpp_shared_jumpcnf
  hidden_dim: 32
  spatial_dim: 2
  event_cov_dim: 0
  field_cov_dim: 0
  backbone:
    tpp_hidden_dims: "32-32"
    tpp_cond: true
    tpp_style: gru
    share_hidden: true
    tpp_actfn: softplus
    solver: dopri5
    atol: 1.0e-4
    rtol: 1.0e-4
    energy_regularization: 1.0e-4
  decoder:
    spatial:
      hidden_dims: "64-64-64"
      layer_type: concat
      actfn: swish
      zero_init: true
      tol: 1.0e-4
      otreg_strength: 1.0e-4
      use_adjoint: true
      solve_reverse: true
      n_flows: 4

training:
  optimizer: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-6
  adam_beta2: 0.98
  grad_clip: 0.0
  n_epochs: 200
  patience: 30
  device: auto
  devices: 1
  strategy: ddp
  precision: 16-mixed
  num_nodes: 1

data:
  normalize: true
  num_workers: 12
  adapter_kwargs:
    max_events: 4000
