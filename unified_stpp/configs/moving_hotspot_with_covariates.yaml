# Moving-hotspot synthetic benchmark with explicit start time t1.
# Hotspot starts near bottom-left corner until t1, then moves continuously
# toward top-right over a configurable duration.

model:
  preset: deep_stpp
  hidden_dim: 64
  spatial_dim: 2
  event_cov_dim: 0
  field_cov_dim: 4
  overrides:
    encoder:
      num_heads: 4
      num_layers: 2

training:
  lr: 0.003
  n_epochs: 50
  batch_size: 32

data:
  type: moving_hotspot
  seed: 42
  # v2: regenerated after covariate fix (time-only features; hotspot proximity removed).
  # Delete this file to regenerate from scratch with the correct feature set.
  dataset_cache: unified_stpp/data_cache/moving_hotspot_shared_v2.pkl
  n_train: 200
  n_val: 50
  t_end: 6.0
  covariate_dim: 4
  spatial_min: -5.0
  spatial_max: 5.0
  base_rate: 0.1
  hotspot_sigma: 0.75
  hotspot_t1_frac: 0.32
  hotspot_t2_frac: 0.46
  hotspot_jitter_radius: 0.55
  hotspot_jitter_f1: 0.8
  hotspot_jitter_f2: 1.25
  hotspot_amp0: 0.0
  hotspot_amp1: 0.55
  hotspot_amp_noise: 0.10
  hotspot_weight: 4.0
  hotspot_interaction_weight: 2.0
  hotspot_tod_weight: 1.0
