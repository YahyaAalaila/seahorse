model:
  preset: thp_gmm
  hidden_dim: 128
  spatial_dim: 2
  hidden_size: [64, 128]
  n_heads: 2
  n_layers: [1, 2]
  dropout: 0.1
  sigma_prior: [0.5, 1.0, 2.0]
  sigma_kernel: [0.25, 0.5, 1.0]
  tau: [0.25, 0.5, 1.0, 2.0]

training:
  optimizer: adam
  lr: {min: 5.0e-4, max: 2.0e-3}
  weight_decay: 0.0
  grad_clip: 1.0
  n_epochs: 100
  patience: 20
  batch_size: 128
  device: cuda
  test_nll_space: raw

data:
  protocol: raw
  normalize: true
  num_workers: 4

tuning:
  n_trials: 24
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 8
  n_gpus_per_trial: 1
  max_concurrent_trials: 1
  fail_fast: false
  verbose: 1
