data:
  protocol: raw
  # Keep HPO aligned with the benchmark path's raw-input policy.
  normalize: false
  batch_size: 25
  num_workers: 0

model:
  preset: nsmpp
  spatial_dim: 2
  decoder:
    type: nsmpp_deepbasis

    # Keep the search anchored to the paper real-data setting while still
    # covering the current bundled default that worked best in this port.
    n_basis: [3, 5]
    basis_dim: [7, 10]
    nn_width: 8

    # mu is the constant additive background rate before softplus.
    mu: [0.001, 0.01, 0.1]

    # Initialization drives a large fraction of NSMPP stability on 2D data.
    init_std: [0.05, 0.1, 0.2]
    init_gain: 5.0e-1
    init_bias: 1.0e-3
    init_weight_mean: [-5.0, -3.0]

    # Keep the HPO compensator light; final benchmark configs should raise this.
    int_res: 20
    numerical_int: true
    intensity_eps: 1.0e-5
    compensator_chunk_size: 256

training:
  optimizer: adadelta
  # Adadelta is the repo-stable choice for this exact 2D port.
  lr: [0.3, 1.0]
  weight_decay: 0.0
  grad_clip: [0.5, 1.0, 5.0]
  n_epochs: 50
  batch_size: 25
  test_nll_space: raw

tuning:
  n_trials: 36
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 4
  n_gpus_per_trial: 1
  max_concurrent_trials: 1
  fail_fast: false
  verbose: 1
