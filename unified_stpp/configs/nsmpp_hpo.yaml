data:
  protocol: raw
  normalize: true
  batch_size: 25
  num_workers: 0

model:
  preset: nsmpp
  spatial_dim: 2
  decoder:
    type: nsmpp_deepbasis

    # --- Capacity: expressiveness of the kernel ---
    # n_basis controls rank of the kernel approximation (upstream: 5)
    n_basis: [2, 3, 5]
    # basis_dim controls the inner product space size per basis pair (upstream: 7)
    basis_dim: [4, 7, 10]
    # nn_width of each basis MLP (upstream: 5 for 1D; 3D input may need more)
    nn_width: [5, 8, 16]

    # --- Background intensity ---
    # mu is the constant additive background rate before softplus
    mu: [0.001, 0.01, 0.1, 1.0]

    # --- Initialization ---
    # init_std controls initial scale of kernel basis weights (raw_weights ~ N(0, init_std))
    # Larger init_std → larger initial compensator → harder optimization
    # Upstream used 1.0 for 1D synthetic; 2D real data needs smaller values
    init_std: [0.05, 0.1, 0.2, 0.5]
    # init_gain and init_bias are Xavier / bias init for the basis MLPs (upstream: 0.5, 0.001)
    init_gain: 5.0e-1
    init_bias: 1.0e-3
    # init_weight_mean: mean of raw_weight init; controls initial excitation scale
    # softplus(-5)≈0.007, softplus(-3)≈0.05, softplus(-1)≈0.31
    # Start negative so model begins as near-Poisson and learns excitation up
    init_weight_mean: [-5.0, -3.0, -1.0]

    # --- Compensator (fixed for HPO speed; increase for final run) ---
    int_res: 20         # 20^2=400 pts — faster trials; use 30-50 in final config
    numerical_int: true
    intensity_eps: 1.0e-5
    compensator_chunk_size: 256

training:
  optimizer: adadelta
  # lr: Adadelta global scale — less sensitive than Adam lr, but matters at extremes
  lr: [0.001, 0.01, 0.1, 1.0]
  weight_decay: 0.0
  # grad_clip: not in upstream; needed for 2D data where compensator can spike
  grad_clip: [0.0, 0.5, 1.0, 5.0]
  n_epochs: 50
  batch_size: 25
  test_nll_space: raw

tuning:
  n_trials: 60
  search_alg: random
  scheduler: asha          # kills unstable/diverging runs early
  metric: val_objective
  mode: min
  n_cpus_per_trial: 2
  n_gpus_per_trial: 0
  max_concurrent_trials: 4
  fail_fast: false
  verbose: 1
