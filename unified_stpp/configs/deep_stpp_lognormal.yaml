# DeepSTPP (LogNormal variant) — legacy configuration
# Encoder: Attention, Dynamics: Identity, Updater: Attention
# Decoder: Factorized — log-normal mixture (temporal) + Gaussian mixture (spatial)
# This was the original "deep_stpp" preset; kept for backwards compatibility.

model:
  preset: deep_stpp_lognormal
  hidden_dim: 64
  spatial_dim: 2
  event_cov_dim: 0
  field_cov_dim: 0
  overrides:
    encoder:
      num_heads: 4
      num_layers: 2
    decoder:
      temporal:
        n_components: 16
      spatial:
        n_components: 16

training:
  lr: 0.001
  weight_decay: 1.0e-5
  grad_clip: 5.0
  n_epochs: 100
  batch_size: 32

data:
  type: hawkes
  n_train: 200
  n_val: 50
  T: 10.0
