# Canonical Diffusion STPP preset.
#
# Use this as a fixed no-HPO baseline only in the sampling/surrogate lane.

model:
  preset: diffusion_stpp
  hidden_dim: 128
  spatial_dim: 2
  n_marks: 0
  encoder:
    type: dstpp_transformer
    d_model: 64
    d_rnn: 256
    d_inner: 128
    n_layers: 4
    n_head: 4
    d_k: 16
    d_v: 16
    dropout: 0.1
    CosSin: true
  decoder:
    type: diffusion_stpp
    # Denoising network hidden units
    hidden_units: 64
    # DDPM diffusion parameters — aligned with original paper defaults
    timesteps: 100
    sampling_timesteps: 100
    objective: pred_noise
    beta_schedule: cosine
    loss_type: l2
  # Diffusion tokens use fixed global min-max scaling on reconstructed delta-times.
  minmax_normalize_time: true

training:
  optimizer: adam
  lr: 1.0e-3
  adam_beta2: 0.99
  weight_decay: 0.0
  grad_clip: 1.0
  n_epochs: 200
  batch_size: 64
  lr_schedule: linear_decay
  lr_warmup_epochs: 5
  lr_final: 5.0e-5
  test_nll_space: raw

# Keep the repository-wide data contract unchanged.
data:
  protocol: standard
  normalize: true
  num_workers: 0
