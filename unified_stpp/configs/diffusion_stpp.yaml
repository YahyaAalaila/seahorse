model:
  preset: diffusion_stpp
  hidden_dim: 128
  spatial_dim: 2
  n_marks: 0
  encoder:
    type: smash_transformer
    d_model: 128
    d_rnn: 64
    d_inner: 256
    n_layers: 4
    n_head: 4
    d_k: 16
    d_v: 16
    dropout: 0.1
    CosSin: true
  decoder:
    type: diffusion_stpp
    # Denoising network hidden units
    hidden_units: 64
    # DDPM diffusion parameters
    timesteps: 1000
    sampling_timesteps: 50
    objective: pred_x0
    beta_schedule: cosine
    loss_type: l2
  # Apply min-max scaling on reconstructed delta-times per batch.
  minmax_normalize_time: true

training:
  lr: 2.0e-4
  weight_decay: 1.0e-5
  grad_clip: 1.0
  n_epochs: 200
  batch_size: 64

# Keep the repository-wide data contract unchanged.
data:
  protocol: standard
  normalize: true
