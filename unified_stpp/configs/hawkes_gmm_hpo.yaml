model:
  preset: hawkes_gmm
  hidden_dim: 128
  spatial_dim: 2
  sigma_prior: [0.5, 1.0, 2.0]
  sigma_kernel: [0.1, 0.25, 0.5, 1.0]
  tau: [0.25, 0.5, 1.0, 2.0]

training:
  optimizer: adam
  lr: {min: 3.0e-4, max: 3.0e-3}
  weight_decay: [0.0, 1.0e-6, 1.0e-5]
  grad_clip: [0.0, 1.0]
  n_epochs: 100
  patience: 20
  batch_size: 128
  test_nll_space: raw

data:
  protocol: raw
  normalize: true
  num_workers: 0

tuning:
  n_trials: 30
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 4
  n_gpus_per_trial: 0
  max_concurrent_trials: 8
  fail_fast: false
  verbose: 1
