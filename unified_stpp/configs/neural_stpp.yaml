# NeuralSTPP — SelfAttentiveCNF variant (Chen et al. 2021, arxiv 2011.04583).
# Preset defaults: AttentionEncoder, NeuralODE dynamics, ConcatSquash CNF,
# self-attentive base distribution, tol=1e-4 (paper default).

model:
  preset: neural_stpp
  hidden_dim: 128          # paper hdims="64-64-64" (width per layer)
  spatial_dim: 2
  event_cov_dim: 0
  field_cov_dim: 0
  # Architecture overrides — deep-merged with the preset.
  overrides:
    encoder:
      num_heads: 4
      num_layers: 2
    dynamics:
      atol: 1.0e-4        # paper --tol 1e-4
      rtol: 1.0e-4
    decoder:
      spatial:
        history_k: 20     # window of past locations for attentive base

training:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  grad_clip: 5.0
  n_epochs: 100
  batch_size: 128
  patience: 30
  lr_schedule: cosine     # cosine decay as in the paper
  lr_warmup_epochs: 5

data:
  type: hawkes
  n_train: 200
  n_val: 50
  T: 10.0
