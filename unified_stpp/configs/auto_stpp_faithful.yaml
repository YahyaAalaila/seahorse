# Upstream-faithful AutoSTPP preset.
#
# Raw benchmark data contract stays in the framework's standard normalized form.
# This preset restores raw inputs internally, constructs paper-style sliding
# windows, MinMax-maps them to the unit square, and evaluates the exact Cuboid
# compensator / likelihood used by upstream AutoSTPP.
model:
  preset: auto_stpp_faithful
  hidden_dim: 128
  spatial_dim: 2
  n_marks: 0
  event_cov_dim: 0
  field_cov_dim: 0
  decoder:
    type: autoint_faithful
    lookback: 20
    lookahead: 1
    activation: tanh
    bias: true
    trunc: false
    max_history: 20
    temporal_diag_mode: exact
    temporal_mc_samples: 10
    report_orig_space_metrics: true
    n_prodnet: 2
    hidden_size: 128
    num_layers: 2
training:
  lr: 0.008149663367631796
  optimizer: adam
  weight_decay: 1.0e-05
  grad_clip: 1.0
  n_epochs: 50
  batch_size: 128
  patience: null
  adam_beta1: 0.9
  adam_beta2: 0.999
  device: auto
  lr_schedule: constant
  lr_warmup_epochs: 0
  lr_final: null
  lr_step_size: 30
  lr_step_gamma: 0.3
  checkpoint_select: best
  test_nll_space: raw
  vae_beta: 0.0
