model:
  preset: auto_stpp
  hidden_dim: 128
  spatial_dim: 2
  decoder:
    type: autoint_faithful
    lookback: 20
    lookahead: 1
    # Upstream real-data config fixes hidden_size=128 and num_layers=2.
    # Keep the benchmark HPO focused on the structural knob that actually
    # differs between the upstream real-data run (n_prodnet=10) and the
    # current bundled benchmark default (n_prodnet=2).
    n_prodnet: [2, 4, 6, 10]
    hidden_size: [128]
    num_layers: [2]
    activation: tanh
    bias: true
    trunc: false
    max_history: 20
    temporal_diag_mode: exact
    temporal_mc_samples: 10
    report_orig_space_metrics: true

training:
  optimizer: adam
  adam_beta1: 0.9
  # Upstream real-data config uses lr=0.004; the bundled benchmark default is
  # also in the same regime, so keep the search narrow enough to be efficient.
  lr: {min: 2.0e-3, max: 1.0e-2}
  weight_decay: [0.0, 1.0e-5]
  grad_clip: [1.0, 5.0]
  n_epochs: 50
  batch_size: 128
  lr_step_size: [20, 30]
  lr_step_gamma: [0.3, 0.5]
  test_nll_space: raw

data:
  protocol: raw
  # Keep HPO on the same raw-input policy as the benchmark path.
  normalize: false

tuning:
  n_trials: 40
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 4
  n_gpus_per_trial: 1
  max_concurrent_trials: 1
  fail_fast: false
  verbose: 1
