model:
  preset: auto_stpp
  hidden_dim: 128
  spatial_dim: 2
  decoder:
    type: autoint
    lookback: 20
    lookahead: 1
    # Keep the paper windowing fixed. Tune only the main integration-capacity
    # knob rather than reopening the full decoder architecture.
    n_prodnet: [2, 6, 10]
    hidden_size: 128
    num_layers: 2
    activation: tanh
    bias: true
    trunc: false
    max_history: 20
    temporal_diag_mode: exact
    temporal_mc_samples: 10
    report_orig_space_metrics: true

training:
  optimizer: adam
  adam_beta1: 0.9
  # Upstream real-data config uses lr=0.004; keep the search narrow around that
  # regime and preserve the StepLR recipe.
  lr: {min: 2.0e-3, max: 1.0e-2}
  weight_decay: [0.0, 1.0e-5]
  grad_clip: [1.0, 5.0]
  n_epochs: 50
  # AutoSTPP trains on paper-style fixed windows; keep the paper batch size.
  batch_size: 128
  lr_step_size: [20, 30]
  lr_step_gamma: [0.3, 0.5]
  test_nll_space: raw

data:
  protocol: raw
  # Keep HPO on the same raw-input policy as the benchmark path. AutoSTPP then
  # forms its paper-style fixed windows only for train/validation.
  normalize: false
  adapter_kwargs:
    training_view: sliding_window
    lookback: 20
    lookahead: 1

tuning:
  n_trials: 30
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 4
  n_gpus_per_trial: 1
  max_concurrent_trials: 1
  fail_fast: false
  verbose: 1
