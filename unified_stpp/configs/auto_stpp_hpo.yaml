model:
  preset: auto_stpp
  hidden_dim: 128
  spatial_dim: 2
  decoder:
    type: autoint_faithful
    lookback: 20
    lookahead: 1
    # Upstream real-data config used n_prodnet=10 with sliding-window training.
    # This repo evaluates exact full-sequence terms, so 10 is too memory-heavy
    # for the current 22 GB cluster GPUs during HPO. Keep the search bounded.
    n_prodnet: [2, 4]
    hidden_size: [128]
    num_layers: [2]
    activation: tanh
    bias: true
    trunc: false
    max_history: 20
    temporal_diag_mode: exact
    temporal_mc_samples: 10
    report_orig_space_metrics: true

training:
  optimizer: adam
  adam_beta1: 0.9
  # Upstream real-data config uses lr=0.004; the bundled benchmark default is
  # also in the same regime, so keep the search narrow enough to be efficient.
  lr: {min: 2.0e-3, max: 1.0e-2}
  weight_decay: [0.0, 1.0e-5]
  grad_clip: [1.0, 5.0]
  n_epochs: 50
  # Upstream used batch_size=128 for sliding-window data. The benchmark path
  # trains on full sequences with exact Auto-STPP terms, so use a GPU-safe HPO
  # batch size and keep the final benchmark budget explicit in the saved YAML.
  batch_size: 16
  lr_step_size: [20, 30]
  lr_step_gamma: [0.3, 0.5]
  test_nll_space: raw

data:
  protocol: raw
  # Keep HPO on the same raw-input policy as the benchmark path.
  normalize: false

tuning:
  n_trials: 24
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 4
  n_gpus_per_trial: 1
  max_concurrent_trials: 1
  fail_fast: false
  verbose: 1
