# Quick-run config for the sequence-coupled Neural STPP variants.
#
# Two new presets — swap model.preset to switch between them:
#
#   neural_stpp_attn_sc  — cross-event attention-conditioned CNF.
#                          All L events solved in one batched ODE. Scales well.
#
#   neural_stpp_jump_sc  — backward-chained radial flows (O(T²) per seq).
#                          More expressive for short sequences (T ≤ 50 events).
#
# Run:
#   python train.py --config unified_stpp/configs/neural_stpp_sc_quick.yaml

model:
  preset: neural_stpp_attn_sc   # swap to neural_stpp_jump_sc for the jump variant
  hidden_dim: 64
  spatial_dim: 2

training:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  grad_clip: 5.0
  max_epochs: 5
  batch_size: 32
  early_stopping_patience: 5

trainer:
  accelerator: cpu
  devices: 1
  logger: csv
  log_dir: logs/

data:
  type: hawkes
  n_train: 100
  n_val: 25
  T: 5.0      # keep sequences short — important for neural_stpp_jump_sc (O(T²))
