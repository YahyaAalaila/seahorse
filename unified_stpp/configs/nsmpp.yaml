data:
  protocol: raw
  normalize: true
  batch_size: 25
  num_workers: 0

model:
  preset: nsmpp
  spatial_dim: 2
  decoder:
    type: nsmpp_deepbasis
    # Tuned defaults from the NSMPP sweep result captured in best_nsmpp_config.yaml.
    mu: 1.0e-2
    n_basis: 2
    basis_dim: 10
    nn_width: 5
    init_gain: 5.0e-1
    init_bias: 1.0e-3
    init_std: 1.0e-1
    init_weight_mean: -5.0
    int_res: 20
    numerical_int: true
    intensity_eps: 1.0e-5
    compensator_chunk_size: 256

training:
  optimizer: adadelta
  lr: 1.0
  weight_decay: 0.0
  grad_clip: 5.0
  n_epochs: 50
  batch_size: 25
  test_nll_space: raw

logging:
  out_dir: runs
