# Bounded real-data HPO config for the shared-hidden Neural STPP conditional-GMM preset.
#
# This is the cheaper neural-STPP spatial head. Keep ODE tolerances fixed and
# tune only hidden size, mixture count, regularization, and optimizer scale.

model:
  preset: neural_cond_gmm
  hidden_dim: [32, 64]
  spatial_dim: 2
  event_cov_dim: 0
  field_cov_dim: 0
  backbone:
    tpp_hidden_dims: ["32-32", "64-64"]
    tpp_cond: true
    tpp_style: gru
    share_hidden: true
    tpp_actfn: softplus
    solver: dopri5
    atol: 1.0e-4
    rtol: 1.0e-4
    energy_regularization: [0.0, 1.0e-5, 1.0e-4]
  decoder:
    spatial:
      hidden_dims: ["64-64", "64-64-64"]
      n_mixtures: [3, 5, 10]
      actfn: softplus

training:
  optimizer: adamw
  lr: {min: 3.0e-4, max: 2.0e-3}
  weight_decay: [0.0, 1.0e-6, 1.0e-5]
  adam_beta2: 0.98
  grad_clip: [0.0, 1.0]
  n_epochs: 200
  patience: 30
  batch_size: 64
  device: cuda
  test_nll_space: raw

data:
  protocol: raw
  normalize: false
  num_workers: 4
  adapter_kwargs:
    max_events: 4000

tuning:
  n_trials: 24
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 8
  n_gpus_per_trial: 1
  max_concurrent_trials: 1
  fail_fast: false
  verbose: 1
