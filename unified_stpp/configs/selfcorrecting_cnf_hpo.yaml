model:
  preset: selfcorrecting_cnf
  hidden_dim: 128
  spatial_dim: 2
  hidden_dims: [[64, 64], [64, 64, 64]]
  layer_type: concat
  actfn: softplus
  tol: 1.0e-5
  otreg_strength: 0.0

training:
  optimizer: adam
  lr: {min: 1.0e-4, max: 2.0e-3}
  weight_decay: 0.0
  grad_clip: 1.0
  n_epochs: 100
  patience: 20
  batch_size: 128
  device: cuda
  test_nll_space: raw

data:
  protocol: raw
  normalize: true
  num_workers: 2

tuning:
  n_trials: 20
  search_alg: random
  scheduler: asha
  metric: val_objective
  mode: min
  n_cpus_per_trial: 4
  n_gpus_per_trial: 1
  max_concurrent_trials: 1
  fail_fast: false
  verbose: 1
