# DeepSTPP in the unified framework — faithful to Lin et al. 2021
# TransformerEncoder (sinusoidal time PE) + LogNormalMixtureTemporal +
# DataCenteredGaussianSpatial (event-location Gaussians + background anchors).

model:
  preset: deep_stpp
  hidden_dim: 64
  spatial_dim: 2
  encoder:
    num_heads: 4
    num_layers: 2
    dropout: 0.1
  updater:
    num_heads: 4
  decoder:
    spatial:
      seq_len: 10           # must equal paper_lookback when using paper_autostpp_sthp
      num_points: 50        # background spatial anchors (50 in paper)
      sigma_min: 0.3        # minimum Gaussian sigma in model space

training:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  grad_clip: 5.0
  n_epochs: 100
  batch_size: 64

data:
  type: sthp
  protocol: paper_autostpp_sthp
