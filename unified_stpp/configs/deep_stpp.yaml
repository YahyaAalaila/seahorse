# DeepSTPP faithful to Lin et al. 2021
#
# Pipeline: TransformerEncoder → VAE → z → (w_dec, b_dec, s_dec) →
#           coupled Hawkes temporal + weighted-GMM spatial intensity
#
# λ_t(t)  = Σ w_i·exp(−b_i·(t−tᵢ))           [Hawkes, closed compensator]
# f(s|t)  = Σ (vᵢ/Σvⱼ)·N(s; sᵢ, diag(σᵢ))  [weights TIED to temporal vᵢ]
# M = seq_len + num_points kernels (history events + background anchors)

model:
  preset: deep_stpp
  hidden_dim: 128
  spatial_dim: 2
  vae: true                   # paper: VAE reparameterization (Lin et al. 2021)
  encoder:
    num_heads: 2 #[2, 4]         # paper: num_head=2  |  HPO choices
    num_layers: 1 #[3, 2, 4]     # paper: nlayers=3   |  HPO choices
    dropout: 0.0              # paper: dropout=0
  updater:
    num_heads: 2 #[2, 4]         # matched to encoder  |  HPO choices
  decoder:
    seq_len: 20               # paper: seq_len=20 (lookback window for Hawkes kernels)
    num_points: 20 #[20, 10, 50]  # paper: num_points=20  |  HPO choices
    sigma_min: 1.0e-4         # paper: s_min=1e-4 (in MinMax [0,1] space)
    n_layers: 3               # paper: decoder_n_layer=3

training:
  lr: 3.0e-4 #{min: 1.0e-4, max: 1.0e-3, default: 3.0e-4}   # paper: lr=0.0003
  adam_beta1: 0.9           # paper: momentum=0.9
  weight_decay: 1.0e-5
  grad_clip: 1.0            # paper: clip=1.0
  n_epochs: 50
  batch_size: 128
  lr_step_size: 50          # paper: step_size=50
  lr_step_gamma: 0.2        # paper: gamma=0.2
  vae_beta: 1.0e-3           # paper: beta=1e-3 (KL weight in ELBO)

data:
  protocol: standard
  normalize: true
  # NOTE: for paper-faithful reproduction of Lin et al. 2021 on the original
  # STHP dataset, use experiments/exp_repro_autostpp_synth_sthp.py which sets
  # protocol=sliding_window and normalize=false (MinMax on delta_t).
