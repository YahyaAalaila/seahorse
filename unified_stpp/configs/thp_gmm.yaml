# THP-GMM: Transformer Hawkes Process temporal + Gaussian Mixture spatial
#
# Temporal: λ(t) = softplus(f(h_n) + β · (t − t_n))
#           where h_n = causal Transformer over Δt₁…Δtₙ (time-PE on absolute times)
#           Compensator: fixed 30-sample Monte Carlo.
# Spatial:  same GaussianMixtureSpatialModel as hawkes_gmm
#
# This is a factorized STPP extension — THP was originally validated on
# pure temporal benchmarks (Zuo et al., ICML 2020). The spatial head is held
# constant across all factorized presets, isolating temporal modeling.
# Label as "THP-GMM (extended)" in paper tables.
#
# NOTE: hyperparameters are provisional. Run a sweep before final benchmark numbers.

model:
  preset: thp_gmm
  hidden_dim: 128
  spatial_dim: 2
  build_overrides:
    hidden_size: 64
    n_heads: 2
    n_layers: 1
    dropout: 0.1
    sigma_prior: 1.0
    sigma_kernel: 0.5
    tau: 1.0

training:
  optimizer: adam
  lr: 1.0e-3
  weight_decay: 0.0
  grad_clip: 1.0
  n_epochs: 100
  batch_size: 128

data:
  protocol: unified
  normalize: true
